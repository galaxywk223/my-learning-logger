{% extends "base.html" %}

{% block title %}设置{% endblock %}

{% block content %}
<article>
    <header>
        <h2>设置</h2>
    </header>

    <form method="POST">
        <label for="week_start_date">
            自定义周的起始日期
            <small>所有周次将从该日期开始计算（例如，学期的第一天）。</small>
        </label>
        <input type="date" id="week_start_date" name="week_start_date" value="{{ current_start_date }}" required>

        <button type="submit">保存设置</button>
    </form>
</article>

{# --- [新增] 危险操作区域 --- #}
<hr>
<article>
    <header>
        <hgroup>
            <h2>危险操作</h2>
            <p>请谨慎操作以下选项。</p>
        </hgroup>
    </header>

    <p>
        <strong>清空所有数据</strong><br>
        <small>此操作将永久删除所有的学习记录、每日效率和每周效率。此操作无法撤销。</small>
    </p>

    <form action="{{ url_for('clear_all_data') }}" method="POST">
        <button type="submit" class="secondary"
                onclick="return confirm('警告：您确定要清空所有学习记录和效率数据吗？此操作将无法撤销！');">
            清空所有数据
        </button>
    </form>
</article>
{% endblock %}
